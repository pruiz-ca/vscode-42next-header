name: Bug Report
about: Report a problem with the extension
title: '[Bug] '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: When I press Ctrl+Alt+H in a Python file...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open a `.py` file
        2. Press `Ctrl+Alt+H`
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Extension version
      placeholder: e.g. 0.42.7
  - type: input
    id: vscode
    attributes:
      label: VS Code version
      placeholder: e.g. 1.98.0
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Output from the VS Code Developer Tools console (Help → Toggle Developer Tools → Console).
      render: shell
